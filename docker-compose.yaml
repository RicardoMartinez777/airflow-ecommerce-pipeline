# docker-compose.yaml
version: '3.8'

# Common Airflow configuration shared by all Airflow services
x-airflow-common: &airflow-common
  # Apache Airflow Docker image version
  image: apache/airflow:2.7.0

  environment:
    # Defines how Airflow executes tasks
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=uXoKuPt95XwycPp_Jd_EAYt2gQCZ5aYr6R87n7Sw-lo=
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__WEBSERVER__SECRET_KEY=your-secret-key
  volumes:
    # Mount local folders inside Airflow containers
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./output:/opt/airflow/output
  depends_on:
    - postgres

services:
  # PostgreSQL database used as Airflow metadata database
  postgres:
    image: postgres:13
    environment:
      # PostgreSQL credentials
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  # Initializes Airflow database and creates admin user
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  # Airflow web interface service
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    # Access Airflow UI at localhost:8080
    ports:
      - "8080:8080"
    restart: always

  # Airflow scheduler service
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

volumes:
  postgres-db-volume: